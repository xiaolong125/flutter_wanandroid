<!DOCTYPE html>
<html>
<head>
  <!--
    如果你的 Web 应用不是部署在站点根路径下，
    请修改下面的 href，使其与实际部署的基础路径一致。

    为了保证正常工作，下面的路径必须以 "/" 开头并以 "/" 结尾。

    更多说明：
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    这里的 base href 只是一个占位符，
    `flutter build` 时会被 `--base-href` 参数的值替换。
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS 相关 meta 标签与图标 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_wanandroid">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- 网站图标 -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_wanandroid</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
